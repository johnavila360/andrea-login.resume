<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login Form</title>
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="index.css" />
</head>
<body>
    <!-- Background Animation -->
    <div class="background">
        <span></span>
        <span></span>
        <span></span>
    </div>

    <!-- Login Container -->
    <div class="container">
        <div class="login-header">
            <h1>Welcome Back</h1>
            <p>Login to your account to continue</p>
        </div>

        <form id="loginForm">
            <div class="input-box">
                <i class="fa-solid fa-envelope"></i>
                <input 
                    type="email" 
                    id="email" 
                    placeholder="Email Address" 
                    required 
                />
            </div>

            <div class="input-box">
                <i class="fa-solid fa-lock"></i>
                <input 
                    type="password" 
                    id="password" 
                    placeholder="Password" 
                    required 
                />
                <span id="togglePassword">
                    <i class="fa-solid fa-eye"></i>
                </span>
            </div>

            <div class="options">
                <label>
                    <input type="checkbox" /> Remember Me
                </label>
                <a href="#">Forgot Password?</a>
            </div>

            <button type="submit" id="button">Login</button>
        </form>

        <div class="signup">
            <p>Don't have an account? <a href="#">Sign Up</a></p>
        </div>

        <!-- Login Link to Resume Dashboard -->
        <div class="signup" style="margin-top: 15px; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 15px;">
            <a href="resume.dashboard.html" class="login-link" style="color: #fff; font-weight: bold; text-decoration: none; background: rgba(255,255,255,0.1); padding: 8px 20px; border-radius: 20px; display: inline-block; transition: 0.3s;">
                <i class="fa-solid fa-arrow-right"></i> View Resume Dashboard
            </a>
        </div>
    </div>

    <!-- JavaScript -->
    <script src="index.js"></script>
</body>
</html>
